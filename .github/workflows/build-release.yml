name: Build Tauri Desktop App

on:
  push:
    tags:
      - 'gui-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install click pyyaml rich fastapi uvicorn python-multipart pyinstaller

      - name: Build Python sidecar
        run: |
          pyinstaller --onefile `
            --name mcp-scanner-backend `
            --hidden-import=scanner `
            --hidden-import=scanner.checks `
            --hidden-import=scanner.models `
            --hidden-import=scanner.reporter `
            --hidden-import=scanner.siem_export `
            --hidden-import=uvicorn `
            --hidden-import=uvicorn.logging `
            --hidden-import=uvicorn.loops `
            --hidden-import=uvicorn.loops.auto `
            --hidden-import=fastapi `
            --hidden-import=starlette `
            --hidden-import=pydantic `
            --hidden-import=yaml `
            backend/main.py

      - name: Setup sidecar for Tauri
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/sidecar
          $triple = "x86_64-pc-windows-msvc"
          Copy-Item -Force "dist/mcp-scanner-backend.exe" "src-tauri/sidecar/mcp-scanner-backend-$triple.exe"
          Copy-Item -Force "dist/mcp-scanner-backend.exe" "src-tauri/sidecar/mcp-scanner-backend.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: gui-v__VERSION__
          releaseName: 'MCP Scanner GUI v__VERSION__'
          releaseBody: 'MCP Security Scanner — Desktop GUI (Windows)'
          releaseDraft: false
          prerelease: false
